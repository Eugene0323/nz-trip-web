<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登入 | NZ Trip</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-container {
      background: white;
      padding: 2.5rem;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      width: 90%;
      max-width: 400px;
    }
    .login-header {
      text-align: center;
      margin-bottom: 2rem;
    }
    .login-header h1 {
      font-size: 1.8rem;
      color: #1a1a2e;
      margin-bottom: 0.5rem;
    }
    .login-header p {
      color: #888;
      font-size: 0.95rem;
    }
    .form-group {
      margin-bottom: 1.2rem;
    }
    .form-group label {
      display: block;
      margin-bottom: 0.5rem;
      color: #555;
      font-weight: 500;
    }
    .form-group input {
      width: 100%;
      padding: 0.8rem 1rem;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 1rem;
      transition: all 0.3s;
    }
    .form-group input:focus {
      outline: none;
      border-color: #4a90d9;
      box-shadow: 0 0 0 3px rgba(74, 144, 217, 0.1);
    }
    .btn {
      width: 100%;
      padding: 0.9rem;
      background: linear-gradient(135deg, #4a90d9 0%, #357abd 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
    }
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(74, 144, 217, 0.4);
    }
    .error-msg {
      background: #fee;
      color: #c00;
      padding: 0.8rem;
      border-radius: 8px;
      margin-bottom: 1rem;
      text-align: center;
      display: none;
    }
    .error-msg.show {
      display: block;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-header">
      <h1>🇳🇿 紐西蘭蜜月</h1>
      <p>請輸入帳號密碼登入</p>
    </div>
    
    <div id="errorMsg" class="error-msg">帳號或密碼錯誤</div>
    
    <form id="loginForm">
      <div class="form-group">
        <label>帳號</label>
        <input type="text" id="username" placeholder="輸入帳號" required>
      </div>
      <div class="form-group">
        <label>密碼</label>
        <input type="password" id="password" placeholder="輸入密碼" required>
      </div>
      <button type="submit" class="btn">登入</button>
    </form>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      
      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const data = await res.json();
        
        if (data.success && data.sessionId) {
          sessionStorage.setItem('nzSessionId', data.sessionId);
          window.location.href = '/index.html';
        } else {
          document.getElementById('errorMsg').classList.add('show');
          document.getElementById('password').value = '';
        }
      } catch (err) {
        document.getElementById('errorMsg').classList.add('show');
      }
    });
    
    // 如果有有效 session，直接跳轉
    if (sessionStorage.getItem('nzSessionId')) {
      window.location.href = '/index.html';
    }
  </script>
</body>
</html>
