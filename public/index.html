<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>紐西蘭蜜月行程 | NZ Trip</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav>
    <div class="nav-container">
      <h1>🇳🇿 紐西蘭蜜月</h1>
      <div class="nav-links">
        <a href="index.html" class="active">行程</a>
        <a href="expenses.html">花費</a>
      </div>
    </div>
  </nav>

  <main>
    <div class="header">
      <h2>📅 行程規劃</h2>
      <button id="addBtn" class="btn btn-primary">+ 新增行程</button>
    </div>

    <div id="itineraryList" class="itinerary-list">
      <div class="loading">載入中...</div>
    </div>
  </main>

  <!-- Modal -->
  <div id="modal" class="modal">
    <div class="modal-content">
      <h3 id="modalTitle">新增行程</h3>
      <form id="itineraryForm">
        <input type="hidden" id="id">
        <div class="form-group">
          <label>日期</label>
          <input type="date" id="date" required>
        </div>
        <div class="form-group">
          <label>天數</label>
          <input type="number" id="day_number" min="1" required>
        </div>
        <div class="form-group">
          <label>地點</label>
          <input type="text" id="location" required>
        </div>
        <div class="form-group">
          <label>活動</label>
          <input type="text" id="activity" required>
        </div>
        <div class="form-group">
          <label>駕駛資訊</label>
          <textarea id="driving_info" rows="2" placeholder="例如：CHC ➔ Tekapo (200km, 2.5h) | 本日總車程：約 4 小時"></textarea>
        </div>
        <div class="form-group">
          <label>住宿</label>
          <input type="text" id="accommodation" placeholder="例如：Lake Tekapo M&H Park">
        </div>
        <div class="form-group">
          <label>詳細備註</label>
          <textarea id="notes" rows="2"></textarea>
        </div>
        <div class="form-group">
          <label>導遊建議</label>
          <textarea id="guide_tips" rows="2" placeholder="教練或導遊的特別提醒"></textarea>
        </div>
        <div class="form-group">
          <label>推薦市集與活動</label>
          <textarea id="recommendations" rows="2" placeholder="推薦的市集、活動等"></textarea>
        </div>
        <div class="form-group">
          <label>自訂地點標籤</label>
          <div id="customLocationsContainer">
            <div class="custom-location-row" style="display:flex; gap:0.5rem; margin-bottom:0.3rem;">
              <input type="text" class="custom-loc-name" placeholder="標籤名稱" style="flex:1; padding:0.5rem; border:1px solid #ddd; border-radius:4px;">
              <input type="url" class="custom-loc-url" placeholder="Google Maps 連結" style="flex:2; padding:0.5rem; border:1px solid #ddd; border-radius:4px;">
              <button type="button" onclick="removeCustomLocRow(this)" style="padding:0.5rem; background:#ff4444; color:white; border:none; border-radius:4px; cursor:pointer;">✕</button>
            </div>
          </div>
          <button type="button" onclick="addCustomLocRow()" style="margin-top:0.5rem; padding:0.4rem 0.8rem; background:#4a90d9; color:white; border:none; border-radius:4px; cursor:pointer; font-size:0.85rem;">+ 新增地點</button>
        </div>
        <div class="form-group">
          <label>附件連結</label>
          <input type="url" id="attachment_url" placeholder="粘貼 Google Drive、Dropbox 或其他檔案分享連結">
        </div>
        <div class="form-group">
          <label>備案</label>
          <textarea id="backup_plan" rows="2" placeholder="如果主要行程無法執行時的替代方案"></textarea>
        </div>
        <div class="form-actions">
          <button type="button" id="cancelBtn" class="btn btn-secondary">取消</button>
          <button type="submit" class="btn btn-primary">儲存</button>
        </div>
      </form>
    </div>
  </div>

  <script src="app.js"></script>
  <script>
    // 檢查登入狀態
    if (!sessionStorage.getItem('nzSessionId')) {
      window.location.href = '/login.html';
    }
    
    // 行程頁面特定邏輯
    document.getElementById('addBtn').addEventListener('click', () => openModal());
    document.getElementById('cancelBtn').addEventListener('click', () => closeModal());
    document.getElementById('itineraryForm').addEventListener('submit', handleSubmit);

    // 產生 Google Maps 連結
    function getMapsUrl(location) {
      const encoded = encodeURIComponent(location + ', New Zealand');
      return `https://www.google.com/maps/search/?api=1&query=${encoded}`
    }

    async function loadItinerary() {
      const res = await authFetch('/api/itinerary');
      const data = await res.json();
      const container = document.getElementById('itineraryList');
      
      if (!data.success || data.data.length === 0) {
        container.innerHTML = '<div class="empty">尚無行程資料</div>';
        return;
      }

      container.innerHTML = data.data.map(item => `
        <div class="card" data-id="${item.id}">
          <div class="card-header">
            <span class="day-badge">Day ${item.day_number}</span>
            <span class="date">${formatDate(item.date)}</span>
          </div>
          <div class="card-location-row">
            <span class="card-location">📍 ${escapeHtml(item.location)}</span>
            <a href="${getMapsUrl(item.location)}" target="_blank" class="maps-link" title="在 Google Maps 查看">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="#4285F4"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
            </a>
          </div>
          <div class="card-activity">${escapeHtml(item.activity)}</div>
          ${item.driving_info ? `<div class="card-driving">🚗 ${escapeHtml(item.driving_info)}</div>` : ''}
          ${item.accommodation ? `<div class="card-accommodation">🏨 住宿：${escapeHtml(item.accommodation)}</div>` : ''}
          ${item.guide_tips ? `<div class="card-guide">🎯 導遊建議：${escapeHtml(item.guide_tips)}</div>` : ''}
          ${item.recommendations ? `<div class="card-recommend">⭐ 推薦：${escapeHtml(item.recommendations)}</div>` : ''}
          ${item.custom_locations ? (() => {
            try {
              const locations = JSON.parse(item.custom_locations);
              if (Array.isArray(locations) && locations.length > 0) {
                return `<div class="card-custom-locations">${locations.map(loc => `
                  <a href="${escapeHtml(loc.url)}" target="_blank" class="custom-map-tag">
                    📍 ${escapeHtml(loc.name)}
                  </a>
                `).join('')}</div>`;
              }
            } catch(e) {}
            return '';
          })() : ''}
          ${item.attachment_url ? `<div class="card-attachment"><a href="${escapeHtml(item.attachment_url)}" target="_blank" class="attachment-link">📎 附件/憑證</a></div>` : ''}
          ${item.notes ? `<div class="card-notes">📝 ${escapeHtml(item.notes)}</div>` : ''}
          ${item.backup_plan ? `<div class="card-backup">💡 備案：${escapeHtml(item.backup_plan)}</div>` : ''}
          <div class="card-actions">
            <button onclick="editItem(${item.id})">編輯</button>
            <button class="danger" onclick="deleteItem(${item.id})">刪除</button>
          </div>
        </div>
      `).join('');
    }

    async function editItem(id) {
      const res = await authFetch(`/api/itinerary/${id}`);
      const data = await res.json();
      if (data.success) {
        openModal(data.data);
      }
    }

    async function deleteItem(id) {
      if (!confirm('確定要刪除這筆行程？')) return;
      await authFetch(`/api/itinerary/${id}`, { method: 'DELETE' });
      loadItinerary();
    }

    async function handleSubmit(e) {
      e.preventDefault();
      const id = document.getElementById('id').value;
      const payload = {
        date: document.getElementById('date').value,
        day_number: parseInt(document.getElementById('day_number').value),
        location: document.getElementById('location').value,
        activity: document.getElementById('activity').value,
        driving_info: document.getElementById('driving_info').value,
        accommodation: document.getElementById('accommodation').value,
        guide_tips: document.getElementById('guide_tips').value,
        recommendations: document.getElementById('recommendations').value,
        custom_locations: getCustomLocations(),
        attachment_url: document.getElementById('attachment_url').value,
        notes: document.getElementById('notes').value,
        backup_plan: document.getElementById('backup_plan').value
      };

      if (id) {
        await authFetch(`/api/itinerary/${id}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
      } else {
        await authFetch('/api/itinerary', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
      }

      closeModal();
      loadItinerary();
    }

    function addCustomLocRow() {
      const container = document.getElementById('customLocationsContainer');
      const row = document.createElement('div');
      row.className = 'custom-location-row';
      row.style = 'display:flex; gap:0.5rem; margin-bottom:0.3rem;';
      row.innerHTML = `
        <input type="text" class="custom-loc-name" placeholder="標籤名稱" style="flex:1; padding:0.5rem; border:1px solid #ddd; border-radius:4px;">
        <input type="url" class="custom-loc-url" placeholder="Google Maps 連結" style="flex:2; padding:0.5rem; border:1px solid #ddd; border-radius:4px;">
        <button type="button" onclick="removeCustomLocRow(this)" style="padding:0.5rem; background:#ff4444; color:white; border:none; border-radius:4px; cursor:pointer;">✕</button>
      `;
      container.appendChild(row);
    }

    function removeCustomLocRow(btn) {
      btn.parentElement.remove();
    }

    function getCustomLocations() {
      const rows = document.querySelectorAll('#customLocationsContainer .custom-location-row');
      const locations = [];
      rows.forEach(row => {
        const name = row.querySelector('.custom-loc-name').value.trim();
        const url = row.querySelector('.custom-loc-url').value.trim();
        if (name && url) {
          locations.push({ name, url });
        }
      });
      return locations.length > 0 ? JSON.stringify(locations) : '';
    }

    loadItinerary();
  </script>
</body>
</html>
